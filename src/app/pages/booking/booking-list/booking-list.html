<p-toast></p-toast>

<div class="card">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Book an Itinerary</h2>
    </div>

    <p-table
        [value]="itineraries"
        [paginator]="true"
        [rows]="10"
        [loading]="loading"
        [globalFilterFields]="['title', 'description', 'difficultyLevel']"
        responsiveLayout="scroll"
    >
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
                <th pSortableColumn="title">Title <p-sortIcon field="title"></p-sortIcon></th>
                <th pSortableColumn="description">Description <p-sortIcon field="description"></p-sortIcon></th>
                <th pSortableColumn="durationDays">Duration <p-sortIcon field="durationDays"></p-sortIcon></th>
                <th pSortableColumn="difficultyLevel">Difficulty <p-sortIcon field="difficultyLevel"></p-sortIcon></th>
                <th>Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-itinerary>
            <tr>
                <td>{{ itinerary.id }}</td>
                <td>{{ itinerary.title }}</td>
                <td>{{ itinerary.description }}</td>
                <td>{{ itinerary.durationDays }} days</td>
                <td>
                    <p-tag [value]="itinerary.difficultyLevel" [severity]="getDifficultySeverity(itinerary.difficultyLevel)"></p-tag>
                </td>
                <td>
                    <button
                        pButton
                        icon="pi pi-eye"
                        label="View Detail"
                        class="p-button-rounded p-button-info p-button-sm"
                        (click)="viewDetail(itinerary)"
                        pTooltip="View details and book"
                    ></button>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="6" class="text-center">No itineraries found</td>
            </tr>
        </ng-template>
    </p-table>
</div>
