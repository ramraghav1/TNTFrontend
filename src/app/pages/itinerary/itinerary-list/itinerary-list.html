<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">Itineraries</h2>
    <button pButton type="button" label="Add New" icon="pi pi-plus" routerLink="/add-itinerary"></button>
  </div>

  <p-table [value]="itineraries" [paginator]="true" [rows]="10" [loading]="loading" [globalFilterFields]="['title','description','difficultyLevel']" responsiveLayout="scroll">
    
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
        <th pSortableColumn="title">Title <p-sortIcon field="title"></p-sortIcon></th>
        <th pSortableColumn="description">Description <p-sortIcon field="description"></p-sortIcon></th>
        <th pSortableColumn="durationDays">Duration <p-sortIcon field="durationDays"></p-sortIcon></th>
        <th pSortableColumn="difficultyLevel">Difficulty <p-sortIcon field="difficultyLevel"></p-sortIcon></th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-itinerary>
      <tr>
        <td>{{ itinerary.id }}</td>
        <td>{{ itinerary.title }}</td>
        <td>{{ itinerary.description }}</td>
        <td>{{ itinerary.durationDays }} days</td>
        <td>{{ itinerary.difficultyLevel }}</td>
        <td class="flex gap-2">
          <button pButton icon="pi pi-eye" class="p-button-text p-button-rounded p-button-info" (click)="viewDetails(itinerary)" pTooltip="View Details"></button>
          <button pButton icon="pi pi-pencil" class="p-button-text p-button-rounded p-button-secondary" (click)="editItinerary(itinerary)" pTooltip="Edit"></button>
          <button pButton icon="pi pi-trash" class="p-button-text p-button-rounded p-button-danger" (click)="deleteItinerary(itinerary)" pTooltip="Delete"></button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center">No itineraries found</td>
      </tr>
    </ng-template>

  </p-table>
</div>
