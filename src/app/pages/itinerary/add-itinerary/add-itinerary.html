<p-fluid>
  <div class="flex flex-col gap-8">
    <!-- Toast Notification -->
    <div>
      <p-toast></p-toast>
    </div>

    <!-- Single Card with All Content -->
    <div class="card flex flex-col gap-6">
      <!-- Title -->
      <h2 class="text-2xl font-bold">Create Itinerary</h2>

      <!-- Basic Information Section -->
      <div>
        <div class="font-semibold text-xl mb-4">Basic Information</div>
        <div class="flex flex-col md:flex-row gap-6">
          <div class="flex flex-col gap-2 w-full">
            <label>Title *</label>
            <input pInputText [(ngModel)]="form.title" placeholder="Enter itinerary title" class="w-full" />
          </div>
          
          <div class="flex flex-col gap-2 w-full">
            <label>Duration (Days) *</label>
            <input pInputText type="number" [(ngModel)]="form.durationDays" placeholder="Number of days" class="w-full" />
          </div>

          <div class="flex flex-col gap-2 w-full">
            <label>Difficulty Level</label>
            <p-select [(ngModel)]="form.difficultyLevel" [options]="difficultyLevelOptions" optionLabel="label" optionValue="value" placeholder="Select difficulty" class="w-full"></p-select>
          </div>
        </div>

        <div class="flex flex-col gap-2 w-full mt-6">
          <label>Description</label>
          <textarea pInputTextarea [(ngModel)]="form.description" placeholder="Enter description" rows="4" class="w-full"></textarea>
        </div>
      </div>

      <!-- Divider -->
      <hr class="my-2">

      <!-- Daily Itinerary Section -->
      <div>
        <div class="flex justify-between items-center mb-4">
          <div class="font-semibold text-xl">Daily Itinerary</div>
          <p-button label="Add Day" (click)="addDay()" icon="pi pi-plus" severity="success"></p-button>
        </div>

        <p-accordion>
          @for (day of form.days; track day.dayNumber; let i = $index) {
            <p-accordionTab [header]="'Day ' + day.dayNumber + ': ' + day.title">
              <div class="flex flex-col gap-6">
                <!-- First Row -->
                <div class="flex flex-col md:flex-row gap-6">
                  <div class="flex flex-col gap-2 w-full">
                    <label>Title</label>
                    <input pInputText [(ngModel)]="day.title" placeholder="Day title" class="w-full" />
                  </div>
                  
                  <div class="flex flex-col gap-2 w-full">
                    <label>Location</label>
                    <input pInputText [(ngModel)]="day.location" placeholder="Location" class="w-full" />
                  </div>
                  
                  <div class="flex flex-col gap-2 w-full">
                    <label>Accommodation</label>
                    <input pInputText [(ngModel)]="day.accommodation" placeholder="Hotel/Resort name" class="w-full" />
                  </div>
                </div>

                <!-- Second Row -->
                <div class="flex flex-col md:flex-row gap-6">
                  <div class="flex flex-col gap-2 w-full">
                    <label>Transport</label>
                    <input pInputText [(ngModel)]="day.transport" placeholder="Transport mode" class="w-full" />
                  </div>

                  <div class="flex flex-col gap-2 w-full">
                    <label>Activities</label>
                    <p-multiSelect [(ngModel)]="day.activities" [options]="activityOptions" optionLabel="label" optionValue="value" placeholder="Select activities" class="w-full"></p-multiSelect>
                  </div>
                </div>

                <!-- Meals Section -->
                <div>
                  <label class="block mb-3 font-semibold">Meals Included</label>
                  <div class="flex gap-6">
                    <div class="flex items-center">
                      <p-checkbox [(ngModel)]="day.breakfastIncluded" binary class="mr-2"></p-checkbox>
                      <label>Breakfast</label>
                    </div>
                    <div class="flex items-center">
                      <p-checkbox [(ngModel)]="day.lunchIncluded" binary class="mr-2"></p-checkbox>
                      <label>Lunch</label>
                    </div>
                    <div class="flex items-center">
                      <p-checkbox [(ngModel)]="day.dinnerIncluded" binary class="mr-2"></p-checkbox>
                      <label>Dinner</label>
                    </div>
                  </div>
                </div>

                <!-- Remove Button -->
                <div>
                  <p-button label="Remove Day" severity="danger" (click)="removeDay(i)" icon="pi pi-trash"></p-button>
                </div>
              </div>
            </p-accordionTab>
          }
        </p-accordion>
      </div>

      <!-- Divider -->
      <hr class="my-2">

      <!-- Action Buttons -->
      <div class="flex justify-end gap-3 mt-4">
        <p-button label="Save Itinerary" (click)="submitItinerary()" icon="pi pi-check"></p-button>
        <p-button label="Cancel" severity="secondary" (click)="resetForm()" icon="pi pi-times"></p-button>
      </div>
    </div>
  </div>
</p-fluid>
