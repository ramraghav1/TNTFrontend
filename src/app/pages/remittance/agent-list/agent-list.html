<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="card">
    <p-toolbar styleClass="mb-6">
        <ng-template #start>
            <span class="font-semibold text-xl">Agents</span>
        </ng-template>
        <ng-template #end>
            <button pButton label="New Agent" icon="pi pi-plus" severity="success" (click)="openNew()"></button>
        </ng-template>
    </p-toolbar>

    <p-table
        #dt
        [value]="agents"
        [paginator]="true"
        [rows]="10"
        [loading]="loading"
        [showGridlines]="true"
        [rowHover]="true"
        responsiveLayout="scroll"
        [globalFilterFields]="['name', 'countryName', 'contactPerson', 'contactEmail', 'contactPhone']"
    >
        <ng-template pTemplate="caption">
            <div class="flex justify-between items-center flex-wrap gap-2">
                <button pButton label="Clear" class="p-button-outlined" icon="pi pi-filter-slash" (click)="clear(dt)"></button>
                <p-iconfield iconPosition="left">
                    <p-inputicon><i class="pi pi-search"></i></p-inputicon>
                    <input #filterInput pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search agents..." />
                </p-iconfield>
            </div>
        </ng-template>

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="name">Agent Name <p-sortIcon field="name"></p-sortIcon></th>
                <th pSortableColumn="countryName">Country <p-sortIcon field="countryName"></p-sortIcon></th>
                <th pSortableColumn="contactPerson">Contact Person <p-sortIcon field="contactPerson"></p-sortIcon></th>
                <th pSortableColumn="contactEmail">Email <p-sortIcon field="contactEmail"></p-sortIcon></th>
                <th pSortableColumn="contactPhone">Phone <p-sortIcon field="contactPhone"></p-sortIcon></th>
                <th>Status</th>
                <th style="min-width: 8rem">Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item>
            <tr>
                <td class="font-semibold">{{ item.name }}</td>
                <td>{{ item.countryName }}</td>
                <td>{{ item.contactPerson }}</td>
                <td class="text-color-secondary">{{ item.contactEmail }}</td>
                <td>{{ item.contactPhone }}</td>
                <td>
                    <p-tag [value]="item.isActive ? 'Active' : 'Inactive'" [severity]="item.isActive ? 'success' : 'danger'"></p-tag>
                </td>
                <td>
                    <div class="flex gap-2">
                        <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-success p-button-sm" (click)="editItem(item)"></button>
                        <button pButton icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-sm" (click)="deleteItem(item)"></button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="7" class="text-center py-6">
                    <div class="flex flex-col items-center gap-2 text-color-secondary">
                        <i class="pi pi-users text-4xl"></i>
                        <span>No agents found.</span>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Create / Edit Dialog -->
<p-dialog
    [(visible)]="dialogVisible"
    [header]="editMode ? 'Edit Agent' : 'New Agent'"
    [modal]="true"
    [style]="{ width: '550px' }"
    [closable]="true"
>
    <p-fluid>
        <div class="flex flex-col gap-4 mt-2">
            <div class="flex flex-col gap-2">
                <label for="agentName" class="font-semibold">Agent Name *</label>
                <input pInputText id="agentName" [(ngModel)]="selectedItem.name" placeholder="Agent name" />
            </div>

            <div class="flex flex-col gap-2">
                <label for="country" class="font-semibold">Country *</label>
                <p-select
                    id="country"
                    [options]="countries"
                    [(ngModel)]="selectedItem.countryId"
                    optionLabel="name"
                    optionValue="id"
                    placeholder="Select Country"
                    [filter]="true"
                    filterPlaceholder="Search country..."
                ></p-select>
            </div>

            <div class="flex flex-col gap-2">
                <label for="contactPerson" class="font-semibold">Contact Person</label>
                <input pInputText id="contactPerson" [(ngModel)]="selectedItem.contactPerson" placeholder="Contact person name" />
            </div>

            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex flex-col gap-2 w-full">
                    <label for="contactEmail" class="font-semibold">Email</label>
                    <input pInputText id="contactEmail" [(ngModel)]="selectedItem.contactEmail" placeholder="email@example.com" />
                </div>
                <div class="flex flex-col gap-2 w-full">
                    <label for="contactPhone" class="font-semibold">Phone</label>
                    <input pInputText id="contactPhone" [(ngModel)]="selectedItem.contactPhone" placeholder="+1234567890" />
                </div>
            </div>

            <div class="flex items-center gap-2">
                <p-toggleswitch id="isActive" [(ngModel)]="selectedItem.isActive"></p-toggleswitch>
                <label for="isActive" class="font-semibold">Active</label>
            </div>
        </div>
    </p-fluid>

    <ng-template pTemplate="footer">
        <button pButton label="Cancel" icon="pi pi-times" class="p-button-text" (click)="dialogVisible = false"></button>
        <button pButton label="Save" icon="pi pi-check" (click)="saveItem()" [disabled]="!selectedItem.name || !selectedItem.countryId"></button>
    </ng-template>
</p-dialog>
